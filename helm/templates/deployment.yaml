apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        # Force restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        app: {{ .Release.Name }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 2000
      containers:
        - name: scopa2-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # --- PROBES ---
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

          env:
            - name: DB_PORT
              value: {{ .Values.db.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.db.database | quote }}
            - name: DB_HOST
              value: "{{ .Values.db.localNode }},{{ .Values.db.backups }}"
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redis.password | quote }}
            - name: BROADCAST_CONNECTION
              value: "pusher"
            - name: PUSHER_HOST
              value: {{ .Values.soketi.host | quote }}
            - name: PUSHER_PORT
              value: {{ .Values.soketi.port | quote }}
            - name: PUSHER_APP_ID
              value: {{ .Values.soketi.appId | quote }}
            - name: PUSHER_APP_KEY
              value: {{ .Values.soketi.appKey | quote }}
            - name: PUSHER_APP_SECRET
              value: {{ .Values.soketi.appSecret | quote }}
            - name: PUSHER_SCHEME
              value: "http"
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-db-config

          # --- STORAGE FIX: This stops the 'unable to autosave' error ---
          volumeMounts:
            - name: app-data
              mountPath: /app/pb_data
            - name: tmp-storage
              mountPath: /tmp

      volumes:
        - name: app-data
          emptyDir: {}
        - name: tmp-storage
          emptyDir: {}
