apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    # 1. Standard Performance Tweaks
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # 2. WebSocket Support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

    # 3. Force Nginx to pass the Upgrade headers (Crucial for 101 status)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Forwarded-Proto $scheme;

    # 4. Routing & Rewrites
    # This regex ensures /ws/app/key becomes /app/key for Soketi
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # 5. Disable SSL redirect (Caddy handles SSL, K3s stays on 80)
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Main Laravel App
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: 80
          # WebSocket / Soketi
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-soketi-service
                port:
                  number: 6001
