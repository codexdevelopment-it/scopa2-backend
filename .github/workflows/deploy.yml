name: Deploy to K3s

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

# Prevent concurrent deployments
concurrency:
  group: deploy-k3s
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Output image details
        run: |
          echo "Image pushed successfully!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy to K3s via Tailscale
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@10.69.69.111 "echo 'SSH connection successful' && kubectl get nodes"

      - name: Extract short SHA for image tag
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Copy Helm charts to server
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@10.69.69.111 "mkdir -p ~/scopa2-deployment"
          scp -i ~/.ssh/id_ed25519 -r helm ubuntu@10.69.69.111:~/scopa2-deployment/

      - name: Deploy to region-eu
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@10.69.69.111 << 'EOF'
            set -e
            cd ~/scopa2-deployment

            echo "🚀 Deploying to region-eu..."
            helm upgrade --install scopa2-eu ./helm \
              -f helm/values.yaml \
              -f helm/values-eu.yaml \
              --set image.tag=main-${{ steps.vars.outputs.short_sha }} \
              -n region-eu \
              --wait \
              --timeout 5m

            echo "✅ Deployment to region-eu completed"

            echo "📊 Checking rollout status..."
            kubectl rollout status deployment/scopa2-eu -n region-eu --timeout=5m

            echo "🔍 Verifying pods..."
            kubectl get pods -n region-eu -l app=scopa2-eu

            echo "🎯 Current deployment info:"
            kubectl get deployment scopa2-eu -n region-eu -o jsonpath='{.spec.template.spec.containers[0].image}'
            echo ""
          EOF

      - name: Deploy to region-us
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@10.69.69.111 << 'EOF'
            set -e
            cd ~/scopa2-deployment

            echo "🚀 Deploying to region-us..."
            helm upgrade --install scopa2-us ./helm \
              -f helm/values.yaml \
              -f helm/values-us.yaml \
              --set image.tag=main-${{ steps.vars.outputs.short_sha }} \
              -n region-us \
              --wait \
              --timeout 5m

            echo "✅ Deployment to region-us completed"

            echo "📊 Checking rollout status..."
            kubectl rollout status deployment/scopa2-us -n region-us --timeout=5m

            echo "🔍 Verifying pods..."
            kubectl get pods -n region-us -l app=scopa2-us

            echo "🎯 Current deployment info:"
            kubectl get deployment scopa2-us -n region-us -o jsonpath='{.spec.template.spec.containers[0].image}'
            echo ""
          EOF

      - name: Verify all deployments
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@10.69.69.111 << 'EOF'
            echo "========================================="
            echo "📋 Deployment Summary"
            echo "========================================="

            echo ""
            echo "Region EU:"
            kubectl get pods -n region-eu -l app=scopa2-eu
            kubectl get hpa -n region-eu

            echo ""
            echo "Region US:"
            kubectl get pods -n region-us -l app=scopa2-us
            kubectl get hpa -n region-us

            echo ""
            echo "✨ All deployments verified successfully!"
          EOF

      - name: Deployment summary
        if: success()
        run: |
          echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`main-${{ steps.vars.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ region-eu namespace" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ region-us namespace" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`main-${{ steps.vars.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for error details." >> $GITHUB_STEP_SUMMARY
          echo "Helm will automatically rollback to the previous version." >> $GITHUB_STEP_SUMMARY
